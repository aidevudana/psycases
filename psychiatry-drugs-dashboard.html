<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychiatry Drugs — Viva Dashboard</title>
<style>
  :root{
    --navy:#1B2A41;
    --navy-2:#26405e;
    --teal:#1F7A8C;
    --teal-light:#E7F3F5;
    --amber:#E8A33D;
    --amber-light:#FDF3E1;
    --red:#B23A48;
    --red-light:#FBEAEC;
    --green:#2f7d5b;
    --grey:#5b6470;
    --bg:#F4F6F8;
    --card:#ffffff;
    --line:#e5e9ee;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:var(--bg); color:#1a1a1a; -webkit-text-size-adjust:100%;
  }

  header{
    background:linear-gradient(135deg, var(--navy), var(--navy-2));
    color:#fff; padding:18px 18px 14px;
  }
  header h1{margin:0 0 3px; font-size:1.25rem;}
  header p{margin:0; font-size:0.78rem; opacity:0.82;}

  .searchbar{padding:10px 14px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:60;}
  .searchbar input{
    width:100%; padding:11px 14px; border-radius:10px; border:1px solid #d0d6dc;
    font-size:0.95rem; outline:none;
  }
  .searchbar input:focus{border-color:var(--teal); box-shadow:0 0 0 3px rgba(31,122,140,.12);}

  .wrap{display:flex; max-width:1150px; margin:0 auto;}
  .side{
    width:230px; flex-shrink:0; background:var(--card); border-right:1px solid var(--line);
    padding:12px 10px 40px; height:calc(100vh - 108px); overflow-y:auto; position:sticky; top:63px;
  }
  .grp-title{
    font-size:0.68rem; text-transform:uppercase; letter-spacing:.6px; color:var(--grey);
    font-weight:700; margin:14px 8px 6px;
  }
  .grp-title:first-child{margin-top:2px;}
  .navbtn{
    display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:none;
    background:transparent; color:#26333f; padding:9px 10px; border-radius:8px; cursor:pointer;
    font-size:0.85rem; font-family:inherit; margin:1px 0;
  }
  .navbtn:hover{background:#eef2f5;}
  .navbtn.active{background:var(--navy); color:#fff;}
  .navbtn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  main{flex:1; min-width:0; padding:18px 18px 70px; max-width:900px;}

  .panel{display:none; animation:fade .18s ease;}
  .panel.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:none;}}

  .hero{color:#fff; border-radius:12px; padding:16px 18px; margin-bottom:16px;}
  .hero .cls{font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; background:rgba(255,255,255,.2);
    display:inline-block; padding:2px 9px; border-radius:6px; margin-bottom:8px;}
  .hero h2{margin:0 0 3px; font-size:1.3rem;}
  .hero p{margin:0; font-size:0.82rem; opacity:.9;}

  .sec{background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:12px; overflow:hidden;}
  .sec-h{
    padding:11px 16px; font-weight:700; font-size:0.9rem; color:var(--navy);
    display:flex; align-items:center; gap:9px; cursor:pointer; user-select:none;
    border-left:4px solid var(--teal);
  }
  .sec-h .chev{margin-left:auto; transition:.2s; color:var(--grey); font-size:0.8rem;}
  .sec-h.closed .chev{transform:rotate(-90deg);}
  .sec-b{padding:2px 16px 14px;}
  .sec-b.hidden{display:none;}

  .kv{display:flex; gap:10px; padding:9px 0; border-bottom:1px dashed var(--line); font-size:0.86rem;}
  .kv:last-child{border-bottom:none;}
  .kv .k{font-weight:700; color:var(--navy); min-width:64px; flex-shrink:0;}

  ul.bl{margin:6px 0 2px; padding-left:18px;}
  ul.bl li{font-size:0.86rem; line-height:1.5; margin-bottom:4px;}
  ul.bl li::marker{color:var(--teal);}

  table.se{width:100%; border-collapse:collapse; font-size:0.83rem; margin-top:4px;}
  table.se th{padding:7px 9px; color:#fff; text-align:left; font-size:0.78rem;}
  table.se th.c{background:var(--teal);}
  table.se th.r{background:var(--red);}
  table.se td{padding:6px 9px; vertical-align:top; border-bottom:1px solid #f0f3f5; width:50%;}
  table.se td.c{background:var(--teal-light);}
  table.se td.r{background:var(--red-light);}

  .callout{border-radius:8px; padding:9px 12px; font-size:0.82rem; margin:6px 0 2px;}
  .callout.warn{background:var(--red-light); border:1px solid var(--red);}
  .callout.note{background:var(--amber-light); border:1px solid var(--amber);}

  .menu-btn{display:none;}
  @media(max-width:820px){
    .wrap{flex-direction:column;}
    .side{
      position:fixed; left:-260px; top:0; height:100vh; width:250px; z-index:80;
      transition:left .2s ease; box-shadow:4px 0 20px rgba(0,0,0,.18); padding-top:16px;
    }
    .side.open{left:0;}
    main{max-width:100%; padding:16px 14px 70px;}
    .menu-btn{display:inline-flex; align-items:center; gap:7px; background:var(--teal-light);
      color:var(--navy); border:none; border-radius:8px; padding:9px 13px; font-size:0.85rem;
      font-weight:600; cursor:pointer; margin-bottom:14px; font-family:inherit;}
    .backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:79;}
    .backdrop.show{display:block;}
  }

  footer{text-align:center; padding:14px; font-size:0.7rem; color:var(--grey);}
</style>
</head>

const main = document.getElementById('main');
const side = document.getElementById('side');
const allItems = [...drugs, ...concepts];

const groupOrder = ["Antipsychotics","Mood Stabilizers","Antidepressants","Anxiolytics &amp; Detox","Anti-dementia","Concepts"];
const grouped = {};
allItems.forEach(d=>{ (grouped[d.group] ||= []).push(d); });

let navHtml = "";
groupOrder.forEach(g=>{
  if(!grouped[g]) return;
  navHtml += `<div class="grp-title">${g}</div>`;
  grouped[g].forEach(d=>{
    navHtml += `<button class="navbtn" data-id="${d.id}" onclick="show('${d.id}')">
      <span class="dot" style="background:${COLORS[d.color]}"></span>${d.name}</button>`;
  });
});
side.innerHTML = navHtml;

function section(title, inner){
  return `<div class="sec">
    <div class="sec-h" onclick="this.classList.toggle('closed');this.nextElementSibling.classList.toggle('hidden');">
      ${title}<span class="chev">▾</span></div>
    <div class="sec-b">${inner}</div>
  </div>`;
}
function bullets(arr){ return `<ul class="bl">${arr.map(x=>`<li>${x}</li>`).join('')}</ul>`; }
function seTable(common, rare){
  const n = Math.max(common.length, rare.length); let rows="";
  for(let i=0;i<n;i++){
    rows += `<tr><td class="c">${common[i]?'• '+common[i]:''}</td><td class="r">${rare[i]?'• '+rare[i]:''}</td></tr>`;
  }
  return `<table class="se"><tr><th class="c">Common</th><th class="r">Rare / serious</th></tr>${rows}</table>`;
}
function callouts(arr){ return (arr||[]).map(c=>`<div class="callout ${c.type}">${c.text}</div>`).join(''); }

function renderDrug(d){
  let html = `<div class="hero" style="background:${COLORS[d.color]}">
      <span class="cls">${d.cls}</span><h2>${d.name}</h2><p>${d.subtitle}</p></div>`;
  html += section("Mechanism &amp; Route",
    `<div class="kv"><span class="k">MOA</span><span>${d.moa}</span></div>
     <div class="kv"><span class="k">Route</span><span>${d.route}</span></div>`);
  html += section("Indications", bullets(d.indications));
  html += section("Contraindications &amp; Cautions", bullets(d.contra));
  html += section("Side Effects", seTable(d.common, d.rare));
  html += section("Dosage", bullets(d.dosage));
  html += section("Monitoring", bullets(d.monitor) + callouts(d.callouts));
  return html;
}
function renderConcept(c){
  let html = `<div class="hero" style="background:${COLORS[c.color]}">
      <span class="cls">${c.cls}</span><h2>${c.name}</h2><p>${c.subtitle}</p></div>`;
  (c.seTables||[]).forEach(t=>{ html += section(t.title, seTable(t.common, t.rare)); });
  (c.blocks||[]).forEach(b=>{ html += section(b.h, `<p style="font-size:0.86rem;line-height:1.55;margin:6px 0 2px;">${b.body}</p>`); });
  return html;
}

let panelsHtml = "";
drugs.forEach(d=>{ panelsHtml += `<section class="panel" id="p-${d.id}">${renderDrug(d)}</section>`; });
concepts.forEach(c=>{ panelsHtml += `<section class="panel" id="p-${c.id}">${renderConcept(c)}</section>`; });
main.innerHTML = panelsHtml;

function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById('p-'+id); if(el) el.classList.add('active');
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
  window.scrollTo({top:0, behavior:'smooth'});
  closeMenu();
}
function openMenu(){ document.getElementById('side').classList.add('open'); document.getElementById('backdrop').classList.add('show'); }
function closeMenu(){ document.getElementById('side').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }

document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  if(q.length<2){ document.querySelectorAll('.navbtn').forEach(b=>b.style.display=''); return; }
  let first=null;
  allItems.forEach(d=>{
    const hay = JSON.stringify(d).toLowerCase();
    const btn = side.querySelector(`[data-id="${d.id}"]`);
    if(hay.includes(q)){ if(btn) btn.style.display=''; if(!first) first=d.id; }
    else if(btn){ btn.style.display='none'; }
  });
  if(first) show(first);
});

const menuBtn = document.createElement('button');
menuBtn.className='menu-btn'; menuBtn.innerHTML='☰ &nbsp;Browse drugs';
menuBtn.onclick=openMenu;
main.insertBefore(menuBtn, main.firstChild);

show('clozapine');
</script>
